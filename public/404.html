<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Makerverse</title>
    <script>
      (function () {
        var path = window.location.pathname;
        var search = window.location.search ? '&' + window.location.search.slice(1) : '';
        var hash = window.location.hash || '';
        window.location.replace('/?redirect=' + encodeURIComponent(path) + search + hash);
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to Makerverse...</p>
  </body>
</html>
